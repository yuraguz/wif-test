# This is a basic workflow to help you get started with Actions

name: CI

# Controls when the workflow will run
on:
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:
    inputs:
      audience:
        description: 'Audience for OIDC token (WIF provider resource URL)'
        required: false
        default: '//iam.googleapis.com/projects/444107641422/locations/global/workloadIdentityPools/github-pool/providers/github-provider'
        type: string
# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  # This workflow contains a single job called "build"
  getToken:
    # The type of runner that the job will run on
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
      - uses: actions/checkout@v4

      - name: Get OIDC Token Debug Info
        run: |
          echo "=== OIDC Token Request Info ==="
          echo "Token Request URL: $ACTIONS_ID_TOKEN_REQUEST_URL"
          echo "Token Request Token (first 20 chars): ${ACTIONS_ID_TOKEN_REQUEST_TOKEN:0:20}..."
          echo ""
          echo "=== Audience ==="
          echo "Using audience: ${{ github.event.inputs.audience }}"

      - name: Request and Display OIDC Token
        id: oidc
        run: |
          AUDIENCE="${{ github.event.inputs.audience }}"

          echo "=== Requesting OIDC Token ==="

          # Get the OIDC token
          OIDC_RESPONSE=$(curl -s -H "Authorization: bearer ${ACTIONS_ID_TOKEN_REQUEST_TOKEN}" \
            "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=${AUDIENCE}")

          # Extract token value
          TOKEN_VALUE=$(echo "$OIDC_RESPONSE" | jq -r '.value')

          # Function to decode base64url
          base64url_decode() {
            local input="$1"
            # Add padding if needed
            local len=$((${#input} % 4))
            if [ $len -eq 2 ]; then
              input="${input}=="
            elif [ $len -eq 3 ]; then
              input="${input}="
            fi
            # Replace base64url chars with base64 chars
            echo "$input" | tr '_-' '/+' | base64 -d 2>/dev/null
          }

          # Split token into parts for display
          echo ""
          echo "=== OIDC Token Parts ==="
          HEADER=$(echo "$TOKEN_VALUE" | cut -d. -f1)
          PAYLOAD=$(echo "$TOKEN_VALUE" | cut -d. -f2)
          SIGNATURE=$(echo "$TOKEN_VALUE" | cut -d. -f3)

          echo "Header: $HEADER"
          echo ""
          echo "Payload: $PAYLOAD"
          echo ""
          echo "Signature: ${SIGNATURE:0:50}..."

          # Decode header
          echo ""
          echo "=== Decoded Header ==="
          base64url_decode "$HEADER" | jq . || echo "Failed to decode header"

          # Decode payload  
          echo ""
          echo "=== Decoded Payload ==="
          DECODED_PAYLOAD=$(base64url_decode "$PAYLOAD")
          echo "$DECODED_PAYLOAD" | jq . || echo "Failed to decode payload"

          # Show claims
          echo ""
          echo "=== Key Claims ==="
          echo "$DECODED_PAYLOAD" | jq -r 'to_entries | .[] | "\(.key): \(.value)"' 2>/dev/null || echo "Could not extract claims"

          # Save token in a file for artifact
          echo "$TOKEN_VALUE" > /tmp/oidc_token.txt
          echo ""
          echo "Token saved to artifact"
          
          # Save token to output for next step
          echo "oidc_token=$TOKEN_VALUE" >> $GITHUB_OUTPUT

      - name: Exchange GitHub OIDC for GCP Token
        env:
          TOKEN_VALUE: ${{ steps.oidc.outputs.oidc_token }}
        run: |
          # Подготовка audience
          AUDIENCE="//iam.googleapis.com/projects/444107641422/locations/global/workloadIdentityPools/github-pool/providers/github-provider"
          
          echo "Exchanging token..."
          
          # Token Exchange запрос (ограниченные права - только чтение)
          RESPONSE=$(curl -s -X POST \
            "https://sts.googleapis.com/v1/token" \
            -H "Content-Type: application/x-www-form-urlencoded" \
            -d "grant_type=urn:ietf:params:oauth:grant-type:token-exchange" \
            -d "audience=$AUDIENCE" \
            -d "subject_token_type=urn:ietf:params:oauth:token-type:jwt" \
            -d "subject_token=${TOKEN_VALUE}" \
            -d "requested_token_type=urn:ietf:params:oauth:token-type:access_token" \
            -d "scope=https://www.googleapis.com/auth/cloud-platform.read-only")
          
          echo "Response: $RESPONSE"
          
          # Извлечь access_token
          ACCESS_TOKEN=$(echo "$RESPONSE" | jq -r '.access_token')
          echo "GCP Access Token obtained!"
          
          # Сохранить токен для следующих шагов
          echo "access_token=${ACCESS_TOKEN:0:20}... (masked)" >> $GITHUB_OUTPUT

      - name: Upload Token Artifact
        uses: actions/upload-artifact@v4
        with:
          name: oidc-token
          path: /tmp/oidc_token.txt
          retention-days: 1