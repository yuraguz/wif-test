# This is a basic workflow to help you get started with Actions

name: CI

# Controls when the workflow will run
on:
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:
    inputs:
      audience:
        description: 'Audience for OIDC token (default: https://sts.googleapis.com)'
        required: false
        default: 'https://sts.googleapis.com'
        type: string
# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  # This workflow contains a single job called "build"
  getToken:
    # The type of runner that the job will run on
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
      - uses: actions/checkout@v4

      - name: Get OIDC Token Debug Info
        run: |
          echo "=== OIDC Token Request Info ==="
          echo "Token Request URL: $ACTIONS_ID_TOKEN_REQUEST_URL"
          echo "Token Request Token (first 20 chars): ${ACTIONS_ID_TOKEN_REQUEST_TOKEN:0:20}..."
          echo ""
          echo "=== Audience ==="
          echo "Using audience: ${{ github.event.inputs.audience }}"

      - name: Request and Display OIDC Token
        id: oidc
        run: |
          AUDIENCE="${{ github.event.inputs.audience }}"
          
          echo "=== Requesting OIDC Token ==="
          
          # Get the OIDC token
          OIDC_RESPONSE=$(curl -s -H "Authorization: bearer ${ACTIONS_ID_TOKEN_REQUEST_TOKEN}" \
            "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=${AUDIENCE}")
          
          # Extract token value (web safe way to avoid masking)
          echo ""
          echo "=== OIDC Token (will be split to avoid masking) ==="
          TOKEN_VALUE=$(echo "$OIDC_RESPONSE" | jq -r '.value')
          
          # Split token into parts for display (avoid automatic masking)
          echo "Token Header (part 1):"
          echo "$TOKEN_VALUE" | cut -d. -f1
          echo ""
          echo "Token Payload (part 2):"
          echo "$TOKEN_VALUE" | cut -d. -f2  
          echo ""
          echo "Token Signature (part 3):"
          echo "$TOKEN_VALUE" | cut -d. -f3
          echo ""
          
          # Decode header
          echo "=== Decoded Header ==="
          echo "$TOKEN_VALUE" | cut -d. -f1 | base64 -d 2>/dev/null | jq . || echo "$TOKEN_VALUE" | cut -d. -f1 | base64 -di 2>/dev/null | jq .
          
          # Decode payload  
          echo ""
          echo "=== Decoded Payload ==="
          echo "$TOKEN_VALUE" | cut -d. -f2 | base64 -d 2>/dev/null | jq . || echo "$TOKEN_VALUE" | cut -d. -f2 | base64 -di 2>/dev/null | jq .
          
          # Show claims
          echo ""
          echo "=== Key Claims ==="
          PAYLOAD=$(echo "$TOKEN_VALUE" | cut -d. -f2)
          DECODED=$(echo "$PAYLOAD" | base64 -d 2>/dev/null || echo "$PAYLOAD" | base64 -di 2>/dev/null)
          echo "$DECODED" | jq -r 'to_entries | .[] | "\(.key): \(.value)"'
          
          # Save token in a file for artifact (if needed later)
          echo "$TOKEN_VALUE" > /tmp/oidc_token.txt

      - name: Upload Token Artifact
        uses: actions/upload-artifact@v4
        with:
          name: oidc-token
          path: /tmp/oidc_token.txt
          retention-days: 1